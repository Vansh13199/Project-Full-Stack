<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Attendance Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#10b981',
                    },
                    animation: {
                        'drop-in': 'dropIn 0.5s ease-out forwards',
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        dropIn: {
                            '0%': { transform: 'translateY(-20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 relative overflow-hidden font-sans">

    <!-- Modern Background -->
    <div class="fixed inset-0 -z-10">
        <div class="absolute inset-0 bg-gradient-to-br from-indigo-50 via-white to-purple-50"></div>
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-purple-200/30 rounded-full blur-3xl animate-blob">
        </div>
        <div
            class="absolute top-[20%] right-[-10%] w-96 h-96 bg-indigo-200/30 rounded-full blur-3xl animate-blob animation-delay-2000">
        </div>
        <div
            class="absolute bottom-[-10%] left-[20%] w-96 h-96 bg-pink-200/30 rounded-full blur-3xl animate-blob animation-delay-4000">
        </div>
    </div>

    <!-- Reset Password Card -->
    <div
        class="bg-white/80 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] w-full max-w-md p-8 animate-drop-in border border-white/20">

        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">
                🔒
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Set New Password</h1>
            <p class="text-gray-500 mt-2">Create a secure password including numbers and symbols</p>
        </div>

        <form id="resetForm" class="space-y-6">
            <input type="hidden" id="email" name="email">
            <input type="hidden" id="token" name="token">

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                <div class="relative">
                    <input type="password" id="password" name="password" placeholder="Min. 6 characters" required
                        minlength="6" autocomplete="new-password"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors outline-none pr-10">
                    <button type="button"
                        class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600 focus:outline-none toggle-password"
                        onclick="togglePassword()">
                        👁
                    </button>
                </div>
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirm
                    Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password"
                    required autocomplete="new-password"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors outline-none">
            </div>

            <button type="submit" id="resetBtn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition-all transform active:scale-95 flex justify-center items-center">
                Reset Password
            </button>
        </form>

    </div>

    <script src="auth.js"></script>
    <script>
        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const token = urlParams.get('token');

        if (email) document.getElementById('email').value = email;
        if (token) document.getElementById('token').value = token;

        if (!email || !token) {
            showToast('Invalid or expired reset link.', 'error');
            document.getElementById('resetBtn').disabled = true;
        }

        // Toggle Password
        function togglePassword() {
            const input = document.getElementById('password');
            if (input.type === 'password') input.type = 'text';
            else input.type = 'password';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');

            if (newPassword !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            setButtonLoading(btn, true);

            try {
                await resetPassword(email, newPassword);
                showToast('Password reset successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                showToast(err.message, 'error');
                setButtonLoading(btn, false);
            }
        });
    </script>
</body>

</html>
